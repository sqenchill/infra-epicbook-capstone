trigger:
- main

jobs:
- job: TerraformInfra
  displayName: "Provision Infrastructure with Terraform"
  timeoutInMinutes: 180

  pool:
    name: Default

  steps:
  - checkout: self

  - script: |
      whoami
      pwd
      ls -la
      which terraform
      terraform --version
    displayName: "Check Agent and Terraform"

  - script: |
      cat > terraform.tfvars <<'TFEOF'
      resource_group_name   = "rg-epicbook-capstone"
      location              = "West US 3"
      vnet_name             = "vnet-epicbook"
      frontend_subnet_name  = "frontend-subnet"
      backend_subnet_name   = "backend-subnet"
      frontend_vm_name      = "epicbook-frontend-vm"
      backend_vm_name       = "epicbook-backend-vm"
      admin_username        = "azureuser"
      ssh_public_key        = "ssh-rsa  epicbook-azure-key"
      mysql_server_name     = "epicbookmysql123456"
      mysql_admin_username  = "epicadmin"
      mysql_admin_password  = "UseAStrongPassword123!"
      mysql_database_name   = "bookstore"
      TFEOF
      sed -i 's/^      //' terraform.tfvars
      echo "=== terraform.tfvars ==="
      cat terraform.tfvars
    displayName: "Create terraform.tfvars"

  - task: AzureCLI@2
    displayName: "Ensure Terraform State Backend"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -e
        echo "Creating resource group rg-tfstate (idempotent)..."
        az group create --name rg-tfstate --location westus3 --output none

        echo "Creating storage account epicbooktfstate (idempotent)..."
        az storage account create \
          --name epicbooktfstate \
          --resource-group rg-tfstate \
          --location westus3 \
          --sku Standard_LRS \
          --output none

        echo "Retrieving storage account key..."
        STORAGE_KEY=$(az storage account keys list \
          --resource-group rg-tfstate \
          --account-name epicbooktfstate \
          --query '[0].value' -o tsv)

        echo "Creating blob container tfstate (idempotent)..."
        az storage container create \
          --name tfstate \
          --account-name epicbooktfstate \
          --account-key "$STORAGE_KEY" \
          --output none

        echo "Terraform state backend is ready"

  - task: AzureCLI@2
    displayName: "Terraform Init"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        cd $(System.DefaultWorkingDirectory)
        export TF_INPUT=0

        STORAGE_KEY=$(az storage account keys list \
          --resource-group rg-tfstate \
          --account-name epicbooktfstate \
          --query '[0].value' -o tsv)

        if [ -z "$STORAGE_KEY" ]; then
          echo "ERROR: Could not retrieve storage account key — backend creation may have failed."
          exit 1
        fi

        export ARM_ACCESS_KEY="$STORAGE_KEY"
        terraform init

  - task: AzureCLI@2
    displayName: "Terraform Validate"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        cd $(System.DefaultWorkingDirectory)
        export TF_INPUT=0
        terraform validate

  - task: AzureCLI@2
    displayName: "Terraform Plan"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        cd $(System.DefaultWorkingDirectory)
        export TF_INPUT=0
        terraform plan -input=false -out=tfplan

  - task: AzureCLI@2
    displayName: "Terraform Apply"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        cd $(System.DefaultWorkingDirectory)
        export TF_INPUT=0
        terraform apply -input=false -auto-approve tfplan

  - task: AzureCLI@2
    displayName: "Terraform Outputs"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        cd $(System.DefaultWorkingDirectory)
        echo "========================================================"
        echo "         INFRASTRUCTURE OUTPUTS — copy these values"
        echo "========================================================"
        APP_IP=$(terraform output -raw app_public_ip)
        BACKEND_PRIV=$(terraform output -raw backend_private_ip)
        BACKEND_PUB=$(terraform output -raw backend_public_ip)
        MYSQL=$(terraform output -raw mysql_fqdn)
        echo "APP_PUBLIC_IP      : $APP_IP"
        echo "BACKEND_PRIVATE_IP : $BACKEND_PRIV"
        echo "BACKEND_PUBLIC_IP  : $BACKEND_PUB"
        echo "MYSQL_FQDN         : $MYSQL"
        echo "========================================================"
        echo "Paste these into the App Pipeline variables before running it."
        echo "##vso[task.setvariable variable=APP_PUBLIC_IP;isOutput=true]$APP_IP"
        echo "##vso[task.setvariable variable=BACKEND_PRIVATE_IP;isOutput=true]$BACKEND_PRIV"
        echo "##vso[task.setvariable variable=BACKEND_PUBLIC_IP;isOutput=true]$BACKEND_PUB"
        echo "##vso[task.setvariable variable=MYSQL_FQDN;isOutput=true]$MYSQL"
