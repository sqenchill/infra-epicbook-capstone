trigger:
- main

jobs:
- job: TerraformInfra
  displayName: "Provision Infrastructure with Terraform"
  timeoutInMinutes: 180

  pool:
    name: Default

  steps:

  # Step 1: Checkout code
  - checkout: self

  # Step 2: Confirm environment
  - script: |
      echo "User:"
      whoami
      echo "Working Directory:"
      pwd
      echo "Files:"
      ls -la
    displayName: "Check Agent Environment"

  # Step 3: Verify Terraform
  - script: |
      which terraform
      terraform --version
    displayName: "Verify Terraform"

  # Step 4: Terraform Init
  - task: AzureCLI@2
    displayName: "Terraform Init"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        cd $(System.DefaultWorkingDirectory)
        terraform init

  # Step 5: Terraform Validate
  - task: AzureCLI@2
    displayName: "Terraform Validate"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        cd $(System.DefaultWorkingDirectory)
        terraform validate

  # Step 6: Terraform Plan
  - task: AzureCLI@2
    displayName: "Terraform Plan"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        cd $(System.DefaultWorkingDirectory)
        terraform plan -out=tfplan

  # Step 7: Terraform Apply
  - task: AzureCLI@2
    displayName: "Terraform Apply"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        cd $(System.DefaultWorkingDirectory)
        terraform apply -auto-approve tfplan

  # Step 8: Output values
  - task: AzureCLI@2
    displayName: "Terraform Outputs"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        cd $(System.DefaultWorkingDirectory)
        terraform output