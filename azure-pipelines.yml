trigger:
- main

pool:
  vmImage: ubuntu-latest

steps:
- task: TerraformInstaller@1
  displayName: Install Terraform
  inputs:
    terraformVersion: 'latest'

- script: terraform --version
  displayName: Verify Terraform

- task: AzureCLI@2
  displayName: Terraform Init
  inputs:
    azureSubscription: 'epicbook-azure-rm'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      terraform init

- task: AzureCLI@2
  displayName: Terraform Validate
  inputs:
    azureSubscription: 'epicbook-azure-rm'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      terraform validate

- task: AzureCLI@2
  displayName: Terraform Plan
  inputs:
    azureSubscription: 'epicbook-azure-rm'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      terraform plan -out=tfplan

- task: AzureCLI@2
  displayName: Terraform Apply
  inputs:
    azureSubscription: 'epicbook-azure-rm'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      terraform apply -auto-approve tfplan

- task: AzureCLI@2
  displayName: Show Terraform Outputs
  inputs:
    azureSubscription: 'epicbook-azure-rm'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      terraform output