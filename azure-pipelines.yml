trigger:
- main

jobs:
- job: TerraformInfra
  displayName: "Provision Infrastructure with Terraform"
  timeoutInMinutes: 180

  pool:
    name: Default

  variables:
    TF_STATE_SA: "tfstateepic27c8"
    TF_STATE_RG: "rg-tfstate"
    ARM_SUBSCRIPTION_ID: "c60727c8-5150-4385-98c6-96705d61a4d0"

  steps:
  - checkout: self

  - script: |
      whoami && pwd && ls -la
      which terraform && terraform --version
    displayName: "Check Agent and Terraform"

  - script: |
      cat > terraform.tfvars <<'TFEOF'
      resource_group_name   = "rg-epicbook-capstone"
      location              = "West US 3"
      vnet_name             = "vnet-epicbook"
      frontend_subnet_name  = "frontend-subnet"
      backend_subnet_name   = "backend-subnet"
      frontend_vm_name      = "epicbook-frontend-vm"
      backend_vm_name       = "epicbook-backend-vm"
      admin_username        = "azureuser"
      ssh_public_key        = "ssh-rsa  epicbook-azure-key"
      mysql_server_name     = "epicbookmysql123456"
      mysql_admin_username  = "epicadmin"
      mysql_admin_password  = "UseAStrongPassword123!"
      mysql_database_name   = "bookstore"
      TFEOF
      sed -i 's/^      //' terraform.tfvars
      echo "=== terraform.tfvars ===" && cat terraform.tfvars
    displayName: "Create terraform.tfvars"

  # ── Creates the storage account used by the azurerm backend.
  #    addSpnToEnvironment is not needed here — only az CLI calls, no Terraform.
  - task: AzureCLI@2
    displayName: "Ensure Terraform State Backend"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      inlineScript: |
        set -e
        echo "Creating resource group $(TF_STATE_RG) (idempotent)..."
        az group create --name $(TF_STATE_RG) --location westus3 --output none || true

        echo "Creating storage account $(TF_STATE_SA) (idempotent)..."
        az storage account create \
          --name $(TF_STATE_SA) \
          --resource-group $(TF_STATE_RG) \
          --location westus3 \
          --sku Standard_LRS \
          --output none || true

        echo "Retrieving storage account key..."
        STORAGE_KEY=$(az storage account keys list \
          --resource-group $(TF_STATE_RG) \
          --account-name $(TF_STATE_SA) \
          --query '[0].value' -o tsv)
        [ -z "$STORAGE_KEY" ] && { echo "ERROR: empty storage key"; exit 1; }

        echo "Creating blob container tfstate (idempotent)..."
        az storage container create \
          --name tfstate \
          --account-name $(TF_STATE_SA) \
          --account-key "$STORAGE_KEY" \
          --output none || true

        echo "State backend ready: $(TF_STATE_SA)/tfstate"

  # ── addSpnToEnvironment: true exposes $servicePrincipalId / $servicePrincipalKey / $tenantId
  #    inside the script so we can map them to ARM_* vars that Terraform's azurerm
  #    provider and backend both understand. Applied to every Terraform step below.
  - task: AzureCLI@2
    displayName: "Terraform Init"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      addSpnToEnvironment: true
      inlineScript: |
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID="$(ARM_SUBSCRIPTION_ID)"

        STORAGE_KEY=$(az storage account keys list \
          --resource-group $(TF_STATE_RG) \
          --account-name $(TF_STATE_SA) \
          --query '[0].value' -o tsv)
        [ -z "$STORAGE_KEY" ] && { echo "ERROR: empty storage key"; exit 1; }
        export ARM_ACCESS_KEY="$STORAGE_KEY"

        cd $(System.DefaultWorkingDirectory)
        export TF_INPUT=0
        terraform init

  - task: AzureCLI@2
    displayName: "Terraform Validate"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      addSpnToEnvironment: true
      inlineScript: |
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID="$(ARM_SUBSCRIPTION_ID)"

        STORAGE_KEY=$(az storage account keys list \
          --resource-group $(TF_STATE_RG) \
          --account-name $(TF_STATE_SA) \
          --query '[0].value' -o tsv)
        export ARM_ACCESS_KEY="$STORAGE_KEY"

        cd $(System.DefaultWorkingDirectory)
        export TF_INPUT=0
        terraform validate

  - task: AzureCLI@2
    displayName: "Terraform Plan"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      addSpnToEnvironment: true
      inlineScript: |
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID="$(ARM_SUBSCRIPTION_ID)"

        STORAGE_KEY=$(az storage account keys list \
          --resource-group $(TF_STATE_RG) \
          --account-name $(TF_STATE_SA) \
          --query '[0].value' -o tsv)
        export ARM_ACCESS_KEY="$STORAGE_KEY"

        cd $(System.DefaultWorkingDirectory)
        export TF_INPUT=0
        terraform plan -input=false -out=tfplan

  - task: AzureCLI@2
    displayName: "Terraform Apply"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      addSpnToEnvironment: true
      inlineScript: |
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID="$(ARM_SUBSCRIPTION_ID)"

        STORAGE_KEY=$(az storage account keys list \
          --resource-group $(TF_STATE_RG) \
          --account-name $(TF_STATE_SA) \
          --query '[0].value' -o tsv)
        export ARM_ACCESS_KEY="$STORAGE_KEY"

        cd $(System.DefaultWorkingDirectory)
        export TF_INPUT=0
        terraform apply -input=false -auto-approve tfplan

  - task: AzureCLI@2
    displayName: "Terraform Outputs"
    inputs:
      azureSubscription: 'epicbook-azure-rm'
      scriptType: bash
      scriptLocation: inlineScript
      addSpnToEnvironment: true
      inlineScript: |
        export ARM_CLIENT_ID="$servicePrincipalId"
        export ARM_CLIENT_SECRET="$servicePrincipalKey"
        export ARM_TENANT_ID="$tenantId"
        export ARM_SUBSCRIPTION_ID="$(ARM_SUBSCRIPTION_ID)"

        STORAGE_KEY=$(az storage account keys list \
          --resource-group $(TF_STATE_RG) \
          --account-name $(TF_STATE_SA) \
          --query '[0].value' -o tsv)
        export ARM_ACCESS_KEY="$STORAGE_KEY"

        cd $(System.DefaultWorkingDirectory)
        echo "========================================================"
        echo "         INFRASTRUCTURE OUTPUTS — copy these values"
        echo "========================================================"
        APP_IP=$(terraform output -raw app_public_ip)
        BACKEND_PRIV=$(terraform output -raw backend_private_ip)
        BACKEND_PUB=$(terraform output -raw backend_public_ip)
        MYSQL=$(terraform output -raw mysql_fqdn)
        echo "APP_PUBLIC_IP      : $APP_IP"
        echo "BACKEND_PRIVATE_IP : $BACKEND_PRIV"
        echo "BACKEND_PUBLIC_IP  : $BACKEND_PUB"
        echo "MYSQL_FQDN         : $MYSQL"
        echo "========================================================"
        echo "Paste these into the App Pipeline variables before running it."
        echo "##vso[task.setvariable variable=APP_PUBLIC_IP;isOutput=true]$APP_IP"
        echo "##vso[task.setvariable variable=BACKEND_PRIVATE_IP;isOutput=true]$BACKEND_PRIV"
        echo "##vso[task.setvariable variable=BACKEND_PUBLIC_IP;isOutput=true]$BACKEND_PUB"
        echo "##vso[task.setvariable variable=MYSQL_FQDN;isOutput=true]$MYSQL"
