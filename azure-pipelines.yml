trigger:
- main

pool:
  name: Default

steps:
- script: |
    sudo apt-get update
    sudo apt-get install -y wget unzip
    wget https://releases.hashicorp.com/terraform/1.8.5/terraform_1.8.5_linux_amd64.zip
    unzip -o terraform_1.8.5_linux_amd64.zip
    sudo mv terraform /usr/local/bin/
    terraform --version
  displayName: Install Terraform

- task: AzureCLI@2
  displayName: Terraform Init
  inputs:
    azureSubscription: 'epicbook-azure-rm'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      terraform init

- task: AzureCLI@2
  displayName: Terraform Validate
  inputs:
    azureSubscription: 'epicbook-azure-rm'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      terraform validate

- task: AzureCLI@2
  displayName: Terraform Plan
  inputs:
    azureSubscription: 'epicbook-azure-rm'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      terraform plan -out=tfplan

- task: AzureCLI@2
  displayName: Terraform Apply
  inputs:
    azureSubscription: 'epicbook-azure-rm'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      terraform apply -auto-approve tfplan

- task: AzureCLI@2
  displayName: Show Terraform Outputs
  inputs:
    azureSubscription: 'epicbook-azure-rm'
    scriptType: bash
    scriptLocation: inlineScript
    inlineScript: |
      terraform output